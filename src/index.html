<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleships</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="nav-bar"></div>
    <div class="popup-window" id="descriptionPopupWindow"></div>
    
    <div class="title">
        <h1>Battleship</h1>
        <p>Strategically locate and sink your opponent's fleet before they destroy yours.</p>
    </div>

    <div class="game-container">

        <div class="board-container">
            <h2>Your Fleet</h2>
            <div id="human-board" class="board"></div>
        </div>

        <div class="board-container">
            <h2>Enemy Waters</h2>
            <div id="computer-board" class="board"></div>
        </div>

    </div>

    <div class="controls">
        <button id="restart-btn">Restart Game</button>
    </div>

    <div class="popup-window" id="resultPopupWindow">
        <div class="result-popup">
            <p class="result"></p>
        </div>
    </div>


</body>

</html>
